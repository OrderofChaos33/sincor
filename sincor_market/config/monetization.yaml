# SINCOR Monetization Configuration
margin:
  floor: 0.20        # Minimum 20% margin
  ceiling: 0.55      # Maximum 55% margin
  
segments:
  enterprise:
    margin_multiplier: 1.8    # 80% markup for enterprise
    priority_weight: 1.3      # Higher priority in auctions
    intro_discount: 0.0       # No intro discount for enterprise
    loyalty_discount: 0.05    # 5% loyalty discount
    
  sme:  # Small/Medium Enterprise - default
    margin_multiplier: 1.3    # 30% markup 
    priority_weight: 1.0      # Standard priority
    intro_discount: 0.15      # 15% intro discount for new SME clients
    loyalty_discount: 0.03    # 3% loyalty discount
    
  startup:
    margin_multiplier: 1.15   # 15% markup - competitive pricing
    priority_weight: 0.9      # Slightly lower priority
    intro_discount: 0.25      # 25% intro discount to encourage adoption
    loyalty_discount: 0.05    # 5% loyalty discount
    
  nonprofit:
    margin_multiplier: 1.1    # 10% markup - minimal margin
    priority_weight: 0.8      # Lower priority
    intro_discount: 0.20      # 20% intro discount
    loyalty_discount: 0.10    # 10% loyalty discount
    
surge:
  deadline:
    rush: 1.40        # <2 hours: 40% surge
    tight: 1.25       # <6 hours: 25% surge
  cap: 3.0            # Never more than 3x base price
  
risk_pricing:
  pii_add: 5.0        # +$5 for PII handling
  ext_write_add: 10.0 # +$10 for external writes  
  legal_add: 15.0     # +$15 for legal compliance tasks
  
bundles:
  rush_plus:
    discount_pct: 0.05  # 5% discount for rush + premium bundle
  enterprise_suite:
    discount_pct: 0.10  # 10% discount for full enterprise package
    
experiment:
  exploration_rate: 0.05  # 5% of quotes use exploration pricing
  smoothing: 0.8         # Price change smoothing factor
  
# Quality gates - pricing won't apply if these thresholds exceeded
safety_rails:
  max_price_change_pct: 0.20  # Max 20% price change per adjustment
  min_provider_payout_pct: 0.60  # Provider must get at least 60% of customer price
  starvation_timeout_hours: 2  # Boost priority after 2 hours waiting