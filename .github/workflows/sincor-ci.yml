name: SINCOR CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test Scheduler
      run: |
        cd services/scheduler
        python test_scheduler.py
    
    - name: Test Content Generator
      run: |
        cd agents/marketing
        python content_gen_agent.py
    
    - name: Test Distribution Handler
      run: |
        cd agents/marketing
        python distribution_handler.py
    
    - name: Test Integrated Marketing Engine
      run: |
        cd services/marketing_workflow
        python integrated_marketing_engine.py
    
    - name: Test Main Application
      run: |
        python -c "from app import app; print('Flask app imports successfully')"
    
    - name: Generate test coverage report
      run: |
        pytest --cov=. --cov-report=xml tests/ || echo "No tests directory found"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: success()
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install safety
      run: pip install safety
    
    - name: Check for security vulnerabilities
      run: |
        pip freeze | safety check --json || echo "Security check completed with warnings"

  deploy:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Railway
      uses: bervProject/railway-deploy@v1.3.0
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
        service: sincor-production
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "SINCOR deployed successfully to Railway"
        
    - name: Notify deployment failure
      if: failure()
      run: |
        echo "SINCOR deployment failed"
        exit 1